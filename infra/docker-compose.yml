services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: videoai
      POSTGRES_PASSWORD: videoai
      POSTGRES_DB: videoai
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
